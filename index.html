<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Thư viện văn bản đấu thầu</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600&display=swap" rel="stylesheet">

<style>

thead th{
position:sticky;
top:0;
z-index:5;
}

body{
font-family:'Montserrat',sans-serif;
margin:0;
display:flex;
background:#f8f9fb;
}

/* SIDEBAR */

.sidebar{
width:260px;
background:#f2f3f5;
height:100vh;
padding:25px;
border-right:1px solid #e5e7eb;
position:sticky;
top:0;
}

.sidebar h2{
margin-top:0;
font-size:20px;
font-weight:600;
color:#374151;
margin-bottom:25px;
}

.sidebar a{
display:flex;
align-items:center;
gap:12px;
padding:12px 14px;
margin-bottom:6px;
color:#374151;
text-decoration:none;
font-size:17px;
border-radius:10px;
font-weight:500;
}

.sidebar a i{
width:20px;
text-align:center;
}

.sidebar a:hover{
background:#ede9fe;
color:#7c3aed;
}

.sidebar a.active{
background:#e9d5ff;
color:#7c3aed;
font-weight:600;
}

/* CONTENT */

.content{
flex:1;
padding:35px;
overflow-x:auto;
}

/* SEARCH */

.searchBox{
margin-bottom:15px;
position:relative;
}

.searchBox i{
position:absolute;
left:12px;
top:50%;
transform:translateY(-50%);
color:#9ca3af;
font-size:14px;
}

.searchBox input{
width:300px;
padding:10px 12px 10px 34px;
border:1px solid #ddd;
border-radius:8px;
font-size:14px;
transition:all .25s ease;
background:white;
}

.searchBox input:hover{
border-color:#c4b5fd;
}

.searchBox input:focus{
outline:none;
border-color:#7c3aed;
box-shadow:0 0 0 3px rgba(124,58,237,0.15);
}

/* TABLE */

table{
width:100%;
border-collapse:collapse;
background:white;
table-layout:auto;
min-width:700px;
}

th,td{
border-bottom:1px solid #eee;
padding:14px;
text-align:left;
vertical-align:top;
overflow-wrap:break-word;
}

th{
background:#6e35e8;
color:white;
}

/* COLUMN WIDTH */

th:nth-child(1), td:nth-child(1){
width:140px;
}

th:nth-child(2), td:nth-child(2){
width:auto;
}

th:nth-child(3), td:nth-child(3){
width:140px;
}

th:nth-child(4), td:nth-child(4){
width:140px;
text-align:center;
}

/* LINK */

a{
color:#6e35e8;
text-decoration:none;
font-weight:500;
}

a:hover{
text-decoration:underline;
}

/* TRÍCH YẾU LINK STYLE */

td:nth-child(2) a{
font-weight:600;
color:#374151;
}

td:nth-child(2) a:hover{
color:#6e35e8;
}

/* ROW HOVER */

tbody tr{
transition:background .2s ease;
}

tbody tr:hover{
background:#f3f4f6;
}

/* PAGINATION */

.pagination{
margin-top:20px;
display:flex;
gap:6px;
flex-wrap:wrap;
}

.page-btn{
padding:6px 10px;
border:1px solid #ddd;
cursor:pointer;
border-radius:6px;
background:white;
}

.page-btn.active{
background:#6e35e8;
color:white;
border:none;
}

</style>

</head>

<body>

<div class="sidebar">

<h2>📚 Văn bản</h2>

<a href="#" onclick="filterDocs('all')">
<i class="fa-solid fa-folder"></i>
Trang chủ
</a>

<a href="#" onclick="filterDocs('luat')">
<i class="fa-solid fa-scale-balanced"></i>
Luật
</a>

<a href="#" onclick="filterDocs('nghidinh')">
<i class="fa-solid fa-file-lines"></i>
Nghị định
</a>

<a href="#" onclick="filterDocs('thongtu')">
<i class="fa-solid fa-file"></i>
Thông tư
</a>

<a href="#" onclick="filterDocs('huongdan')">
<i class="fa-solid fa-bookmark"></i>
Hướng dẫn
</a>

</div>

<div class="content">

<h1>Danh sách văn bản</h1>

<div class="searchBox">
<i class="fa-solid fa-magnifying-glass"></i>
<input type="text" placeholder="Tìm số hoặc tên văn bản..." onkeyup="searchDocs(this.value)">
</div>

<table>

<thead>
<tr>
<th>Số ký hiệu</th>
<th>Trích yếu</th>
<th>Ngày ban hành</th>
<th>File Word</th>
</tr>
</thead>

<tbody id="docTable">
</tbody>

</table>

<div class="pagination" id="pagination"></div>

</div>

<script>

let allDocs=[];
let filteredDocs=[];
let currentPage=1;
const rowsPerPage=25;

/* DATE */

function parseDate(dateStr){
let parts=dateStr.split("/");
return new Date(parts[2],parts[1]-1,parts[0]);
}

/* LOAD DATA */

fetch("https://opensheet.elk.sh/15t10NKlFARFJK0Fqx66R2qxTCKXZn_tjVJfQ-5lUMQI/Sheet1")
.then(res=>res.json())
.then(data=>{

allDocs=data.sort((a,b)=>parseDate(b.ngay)-parseDate(a.ngay));
filteredDocs=allDocs;

renderTable();

});

/* RENDER TABLE */

function renderTable(){

let start=(currentPage-1)*rowsPerPage;
let end=start+rowsPerPage;

let rows=filteredDocs.slice(start,end);

let html="";

rows.forEach(doc=>{

html+=`
<tr>

<td>${doc.so || ""}</td>

<td>
${doc.linkpdf ? `
<a href="${doc.linkpdf}" target="_blank">
${doc.ten || ""}
</a>` : doc.ten || ""}
</td>

<td>${doc.ngay || ""}</td>

<td>
${doc.linkword ? `
<a href="${doc.linkword}" target="_blank">
<i class="fa-solid fa-eye"></i> Xem
</a>` : ""}
</td>

</tr>
`;

});

document.getElementById("docTable").innerHTML=html;

renderPagination();

}

/* PAGINATION */

function renderPagination(){

let totalPages=Math.ceil(filteredDocs.length/rowsPerPage);

let html="";

for(let i=1;i<=totalPages;i++){

html+=`<div class="page-btn ${i===currentPage?'active':''}" onclick="changePage(${i})">${i}</div>`;

}

document.getElementById("pagination").innerHTML=html;

}

function changePage(page){

currentPage=page;
renderTable();

}

/* FILTER */

function filterDocs(type){

if(type==="all"){

filteredDocs=allDocs;

}else{

filteredDocs=allDocs.filter(doc=>doc.type===type);

}

currentPage=1;

renderTable();

}

/* SEARCH */

function searchDocs(keyword){

keyword=keyword.toLowerCase();

filteredDocs=allDocs.filter(doc=>

(doc.so && doc.so.toLowerCase().includes(keyword)) ||
(doc.ten && doc.ten.toLowerCase().includes(keyword))

);

currentPage=1;

renderTable();

}

</script>

</body>
</html>
