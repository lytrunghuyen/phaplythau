<!DOCTYPE html>
<html>
<head>

<script data-goatcounter="https://lytrunghuyen.goatcounter.com/count" async src="//gc.zgo.at/count.js"></script>

<meta charset="utf-8">
<title>Thư viện văn bản đấu thầu</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600&display=swap" rel="stylesheet">

<style>

thead th{
position:sticky;
top:0;
z-index:5;
}

body{
font-family:'Montserrat',sans-serif;
margin:0;
display:flex;
background:#f8f9fb;
line-height:1.4;
font-size:15px;
}

/* VIEW COUNTER */

.viewCounter{
position:fixed;
right:18px;
bottom:18px;
font-size:14px;
color:#6b7280;
background:white;
padding:8px 14px;
border-radius:8px;
box-shadow:0 2px 8px rgba(124,58,237,.12);
border:1px solid rgba(124,58,237,.08);
z-index:999;
}
  
#pdfViewer{
width:100%;
height:800px;
border:1px solid #e5e7eb;
border-radius:8px;
}

/* PDF HEADER */

.pdfHeader{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:10px;
}

.closePDF{
background:#ef4444;
color:white;
border:none;
padding:6px 12px;
border-radius:6px;
cursor:pointer;
font-size:13px;
}

.closePDF:hover{
background:#dc2626;
}
/* SIDEBAR */

.sidebar{
width:260px;
background:#f2f3f5;
height:100vh;
padding:25px;
border-right:1px solid #e5e7eb;
position:sticky;
top:0;
}

.sidebar h2{
margin-top:0;
font-size:20px;
font-weight:600;
color:#374151;
margin-bottom:25px;
}

/* MENU ITEM */

.menu-item{
display:flex;
align-items:center;
gap:12px;
padding:12px 14px;
margin-bottom:6px;
color:#374151;
font-size:16px;   /* trước là 17px */
border-radius:10px;
font-weight:600;
cursor:pointer;
transition:background-color .18s ease,color .18s ease;
}

.menu-item i{
width:22px;
min-width:22px;
text-align:center;
}

.menu-item:hover{
background:#ede9fe;
color:#6e35e8;
transform:translateX(4px);
}

.menu-item:hover i{
color:#6e35e8;
}

.menu-item.active{
background:#6e35e8;
color:white;
}

.menu-item.active i{
color:white;
}

/* DROPDOWN */

.dropdown{
display:flex;
justify-content:space-between;
align-items:center;
}

.dropdown span{
display:flex;
align-items:center;
gap:12px;
}

.caret{
transition:transform .25s ease;
font-size:13px;
}

.dropdown.open .caret{
transform:rotate(90deg);
}

/* SUBMENU - Menu Phân loại */

.submenu{
margin-left:18px;
overflow:hidden;
max-height:300px;
transition:max-height .28s ease;
}

.submenu.hide{
max-height:0;
}

.submenu a{  
display:flex;
align-items:center;
gap:12px;
font-size:15px;
font-weight:500;
padding:10px 12px;
border-radius:8px;
color:#374151;
text-decoration:none;
}

.submenu a i{
width:22px;
min-width:22px;
text-align:center;
font-size:13px;
color:#9ca3af;
}

.submenu a:hover{
background:#ede9fe;
color:#6e35e8;
text-decoration:none;
transform:translateX(4px);
}

.submenu a:hover i{
color:#6e35e8;
}

.submenu a.active{
background:#6e35e8;
color:white;
text-decoration:none;
}

.submenu a.active i{
color:white;
}

/* CONTENT */
  
.content h1{
font-size:30px;
font-weight:600;
margin-bottom:15px;
color:#374151;
}

.content{
flex:1;
padding:35px;
overflow-x:auto;
}

/* SEARCH */

.searchBox{
margin-bottom:15px;
position:relative;
}

.searchBox i{
position:absolute;
left:12px;
top:50%;
transform:translateY(-50%);
color:#9ca3af;
font-size:14px;
}

.searchBox input{
width:300px;
padding:10px 12px 10px 34px;
border:1px solid #ddd;
border-radius:8px;
font-size:14px;
background:white;
transition:.25s;
}

.searchBox input:hover{
border-color:#c4b5fd;
}

.searchBox input:focus{
outline:none;
border-color:#7c3aed;
box-shadow:0 0 0 3px rgba(124,58,237,.15);
}

/* TABLE */

table{
width:100%;
border-collapse:collapse;
background:white;
table-layout:auto;
min-width:900px;
font-size:14px;
}

/* Padding cho nội dung các dòng dữ liệu */
td {
    padding: 9px 6px; 
    vertical-align: middle; /* Căn giữa theo chiều dọc để text đẹp hơn */
}

/* Padding riêng cho hàng tiêu đề */
th {
    padding: 12px 8px; /* Tăng từ 8px lên 15px để tiêu đề rộng ra */
    font-size: 13px;
    letter-spacing: 0.5px;
}

td:nth-child(3){
max-width:0;
}

th{
background:#6e35e8;
color:white;
font-weight:600;
}
  
.tableFooter{
display:flex;
justify-content:space-between;
align-items:center;
margin-top:20px;
flex-wrap:wrap;
gap:10px;
}

.pageInfo{
font-size:13px;
color:#6b7280;
}
  
/* WIDTH - Độ rộng cột phần nội dung*/

th:nth-child(1),td:nth-child(1){width:4%;text-align:center;}   /* STT */
th:nth-child(2),td:nth-child(2){width:7%;}                     /* Số ký hiệu */
th:nth-child(3),td:nth-child(3){width:41%;}                     /* Trích yếu */
th:nth-child(4),td:nth-child(4){width:10%;text-align:center;}   /* Ngày ban hành */
th:nth-child(5),td:nth-child(5){width:10%;text-align:center;}   /* Ngày hiệu lực */
th:nth-child(6),td:nth-child(6){width:10%;text-align:center;}   /* Cơ quan */
th:nth-child(7),td:nth-child(7){width:8%;text-align:center;}    /* Trạng thái */
th:nth-child(8),td:nth-child(8){width:10%;text-align:center;}    /* Files */

a{
color:#6e35e8;
text-decoration:none;
font-weight:500;
}

a:hover{
text-decoration:underline;
}

/* ROW HOVER */

tbody tr{
cursor:pointer;
transition:.2s;
}

tbody tr:hover{
background:#f3f4f6;
box-shadow:0 2px 6px rgba(0,0,0,0.05);
}

tbody tr:hover td:nth-child(-n+4){
color:#6e35e8;
}

/* giữ hover khi đang xem PDF */

tbody tr.activeRow{
background:#f3f4f6;
box-shadow:0 2px 6px rgba(0,0,0,0.05);
}

tbody tr.activeRow td:nth-child(-n+4){
color:#6e35e8;
}

/* PAGINATION */

.pagination{
margin-top:20px;
display:flex;
gap:6px;
flex-wrap:wrap;
}

.page-btn{
padding:6px 10px;
border:1px solid #ddd;
cursor:pointer;
border-radius:6px;
background:white;
}

.page-btn.active{
background:#6e35e8;
color:white;
border:none;
}

/* STATUS */

.status-ok{
background:#22c55e;
color:white;
padding:3px 10px;
border-radius:999px;
font-size:11.5px;
font-weight:500;
display:inline-block;
}

.status-x{
background:#ef4444;
color:white;
padding:3px 10px;
border-radius:999px;
font-size:11.5px;
font-weight:500;
display:inline-block;
position:relative;
}

.status-x:hover::after{
content:attr(data-tooltip);
position:absolute;
bottom:125%;
left:50%;
transform:translateX(-50%);
background:#374151;
color:#fff;
padding:8px 12px;
border-radius:6px;
font-size:12px;
width:200px;
text-align:center;
}
  
.status-ok,
.status-x{
white-space:nowrap;
}

/* Icon Word - Cột File */
.file-icon{
font-size:20px;
color:#6b7280;
transition:.2s;
}

td a:hover .file-icon{
color:#6e35e8;
transform:scale(1.1);
}
  
/* PDF VIEWER */

#pdfViewerSection{
margin-top:40px;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 4px 12px rgba(0,0,0,.06);
display:none;
}

#pdfViewerSection h2{
margin-top:0;
font-size:22px;
color:#374151;
}

#pdfViewer{
width:100%;
height:800px;
border:1px solid #e5e7eb;
border-radius:8px;
}
  
/* PDF POPUP */

#pdfModal{
display:none;
position:fixed;
z-index:1000;
left:0;
top:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.55);
justify-content:center;
align-items:center;
opacity:0;
transition:opacity .25s ease;
}

#pdfModal.show{
display:flex;
opacity:1;
}

.pdfModalContent{
background:white;
width:85%;
height:85%;
border-radius:10px;
padding:15px;
display:flex;
flex-direction:column;
box-shadow:0 15px 50px rgba(0,0,0,0.3);
transform:scale(.92);
transition:transform .25s ease;
}

#pdfModal.show .pdfModalContent{
transform:scale(1);
}

.pdfModalHeader{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:10px;
}

.pdfModalHeader h2{
margin:0;
font-size:18px;
}

.pdfButtons{
display:flex;
gap:8px;
}

.closePDF,
.fullscreenPDF{
border:none;
padding:6px 12px;
border-radius:6px;
cursor:pointer;
font-size:13px;
}

.closePDF{
background:#ef4444;
color:white;
}

.closePDF:hover{
background:#dc2626;
}

.fullscreenPDF{
background:#6e35e8;
color:white;
}

.fullscreenPDF:hover{
background:#5b28c9;
}

#pdfViewer{
flex:1;
width:100%;
border:1px solid #e5e7eb;
border-radius:8px;
}
  
</style>
</head>

<body>

<div class="sidebar">

<h2>📚 Pháp lý đấu thầu</h2>

<div class="menu-item active" onclick="setActive(this);filterDocs('all')">
<i class="fa-solid fa-layer-group"></i>
Tổng hợp
</div>

<div class="menu-item dropdown open" onclick="toggleMenu(this)">
<span>
<i class="fa-solid fa-folder-tree"></i>
Phân loại
</span>
<i class="fa-solid fa-chevron-right caret"></i>
</div>

<div class="submenu">

<a href="#" onclick="setActive(this);filterDocs('luat')">
<i class="fa-solid fa-scale-balanced"></i>
Luật
</a>

<a href="#" onclick="setActive(this);filterDocs('nghidinh')">
<i class="fa-solid fa-file-contract"></i>
Nghị định
</a>

<a href="#" onclick="setActive(this);filterDocs('thongtu')">
<i class="fa-solid fa-file-lines"></i>
Thông tư
</a>

</div>

<div class="menu-item" onclick="setActive(this);filterDocs('huongdan')">
<i class="fa-solid fa-hospital"></i>
Quy trình Bệnh viện
</div>

</div>

<div class="content">

<h1>Danh sách văn bản</h1>

<div class="searchBox">
<i class="fa-solid fa-magnifying-glass"></i>
<input type="text" placeholder="Tìm số hoặc tên văn bản..." onkeyup="searchDocs(this.value)">
</div>

<table>
<thead>
<tr>
<th>STT</th>
<th>Số ký hiệu</th>
<th>Trích yếu</th>
<th>Ngày ban hành</th>
<th>Ngày hiệu lực</th>
<th>Cơ quan ban hành</th>
<th>Trạng thái</th>
<th>Files</th>
</tr>
</thead>
<tbody id="docTable"></tbody>
</table>
  
<div class="tableFooter">

<div class="pageInfo" id="pageInfo"></div>

<div class="pagination" id="pagination"></div>

</div>

<script>

/* SIDEBAR */

function toggleMenu(el){

el.classList.toggle("open");

const submenu=el.nextElementSibling;

submenu.classList.toggle("hide");

}

function setActive(el){

document.querySelectorAll(".menu-item").forEach(i=>i.classList.remove("active"));
document.querySelectorAll(".submenu a").forEach(i=>i.classList.remove("active"));

if(el.classList.contains("menu-item")) el.classList.add("active");
if(el.tagName==="A") el.classList.add("active");

}

/* DATA */

let allDocs=[];
let filteredDocs=[];
let currentPage=1;
const rowsPerPage=20;

function parseDate(dateStr){
if(!dateStr)return new Date(0);
let parts=dateStr.split("/");
return new Date(parts[2],parts[1]-1,parts[0]);
}

fetch("https://opensheet.elk.sh/15t10NKlFARFJK0Fqx66R2qxTCKXZn_tjVJfQ-5lUMQI/Sheet1")
.then(res=>res.json())
.then(data=>{
allDocs=data.sort((a,b)=>parseDate(b.ngay)-parseDate(a.ngay));
filteredDocs=allDocs;
renderTable();
});

function renderTable(){

let start=(currentPage-1)*rowsPerPage;
let end=start+rowsPerPage;

let rows=filteredDocs.slice(start,end);

let html="";

rows.forEach((doc,index)=>{

let stt=start+index+1;

let status="";

if(doc.trangthai==="OK"){
status=`<span class="status-ok">Còn hiệu lực</span>`;
}

else if(doc.trangthai==="X"){
let note=doc.ghichu || "Thông tin đang được cập nhật";
status=`<span class="status-x" data-tooltip="${note}">Hết hiệu lực</span>`;
}

html+=`
<tr onclick="openPDF('${doc.linkpdf}', this)">

<td>${stt}</td>

<td>${doc.so||""}</td>

<td>${doc.ten||""}</td>

<td>${doc.ngay||""}</td>

<td>${doc.hieuluc||""}</td>

<td>${doc.coquan||""}</td>

<td>${status}</td>

<td>
${doc.linkword?
`<a href="${doc.linkword}" target="_blank" onclick="event.stopPropagation();">
<i class="fa-solid fa-file-word file-icon"></i>
</a>`
:""}
</td>

</tr>
`;
});

document.getElementById("docTable").innerHTML=html;
let startItem=start+1;
let endItem=Math.min(end, filteredDocs.length);
document.getElementById("pageInfo").innerText=
`Hiển thị ${startItem}-${endItem} / ${filteredDocs.length} văn bản`;
renderPagination();
  
function openPDF(url,row){
if(!url) return;
url=url.replace("/view","/preview");
const viewer=document.getElementById("pdfViewer");
viewer.src=url;
  
/* highlight row */
  
document.querySelectorAll("#docTable tr").forEach(tr=>{
tr.classList.remove("activeRow");
});
row.classList.add("activeRow");
/* mở popup */

document.getElementById("pdfModal").classList.add("show");
}
  
function closePDF(){

const viewer=document.getElementById("pdfViewer");

viewer.src="";

document.getElementById("pdfModal").classList.remove("show");

/* bỏ highlight */

document.querySelectorAll("#docTable tr").forEach(tr=>{
tr.classList.remove("activeRow");
});

}
  
function renderPagination(){

let totalPages=Math.ceil(filteredDocs.length/rowsPerPage);

let html="";

for(let i=1;i<=totalPages;i++){
html+=`<div class="page-btn ${i===currentPage?'active':''}" onclick="changePage(${i})">${i}</div>`;
}

document.getElementById("pagination").innerHTML=html;

}

function changePage(page){
currentPage=page;
renderTable();
}

function filterDocs(type){

if(type==="all") filteredDocs=allDocs;

else filteredDocs=allDocs.filter(doc=>doc.type===type);

currentPage=1;

renderTable();

}

function searchDocs(keyword){

keyword=keyword.toLowerCase();

filteredDocs=allDocs.filter(doc=>

(doc.so && doc.so.toLowerCase().includes(keyword)) ||

(doc.ten && doc.ten.toLowerCase().includes(keyword))

);

currentPage=1;

renderTable();

}

window.addEventListener("load",function(){

const code='lytrunghuyen';

const url=`https://${code}.goatcounter.com/counter/TOTAL.json`;

fetch(url)
.then(r=>r.json())
.then(data=>{
let actual=parseInt(data.count.replace(/[^0-9]/g,''))||0;
document.getElementById("visitor-count").innerText=(actual*5).toLocaleString();
})
.catch(()=>{
document.getElementById("visitor-count").innerText="---";
});

});
  
function fullscreenPDF(){
const iframe=document.getElementById("pdfViewer");
if(iframe.requestFullscreen){
iframe.requestFullscreen();
}
else if(iframe.webkitRequestFullscreen){
iframe.webkitRequestFullscreen();
}
else if(iframe.msRequestFullscreen){
iframe.msRequestFullscreen();
}
}
  
</script>
<div id="pdfModal" onclick="if(event.target.id==='pdfModal') closePDF()">
<div class="pdfModalContent">
<div class="pdfModalHeader">
  
<h2>📄 Xem văn bản</h2>

<div class="pdfButtons">
<button class="fullscreenPDF" onclick="fullscreenPDF()">Toàn màn hình</button>
<button class="closePDF" onclick="closePDF()">Đóng ✕</button>
</div>
</div>
<iframe id="pdfViewer" src="" frameborder="0"></iframe>
</div>
</div>
  
</body>
</html>
