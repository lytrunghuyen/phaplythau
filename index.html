<!DOCTYPE html>
<html>
<head>

<script data-goatcounter="https://lytrunghuyen.goatcounter.com/count" async src="//gc.zgo.at/count.js"></script>

<meta charset="utf-8">
<title>Thư viện văn bản đấu thầu</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">

<style>
  
.clearSearch{
  position:absolute;
  right:12px;
  top:50%;
  transform:translateY(-50%);
  font-size:18px;
  color:#9ca3af;
  cursor:pointer;
  display:none;
  z-index:2; /* 👈 thêm dòng này */
}

.menu-item i,
.submenu a i{
  font-weight:500;
}
  
.menu-item:hover i{
  opacity:1;
}
  
.menu-item,
.submenu a{
  transition:all .18s ease;
}

.menu-item:hover,
.submenu a:hover{
  box-shadow:0 1px 2px rgba(0,0,0,0.04); /* rất nhẹ */
}
  
thead th{
position:sticky;
top:0;
z-index:5;
}

body{
font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Arial, sans-serif;
margin:0;
background:#f1f3f7;
line-height:1.4;
font-size:15px;
overflow-x:auto;
-webkit-font-smoothing: antialiased;
}

/* VIEW COUNTER */

.viewCounter{
position:fixed;
right:18px;
bottom:18px;
font-size:14px;
color:#6b7280;
background:white;
padding:8px 14px;
border-radius:15px;
box-shadow:0 2px 8px rgba(124,58,237,.12);
border:1px solid rgba(124,58,237,.08);
z-index:999;
}
  
#pdfViewer{
width:100%;
height:800px;
border:1px solid #e5e7eb;
border-radius:15px;
}

/* PDF HEADER */

.pdfHeader{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:10px;
}

.closePDF{
background:#ef4444;
color:white;
border:none;
padding:6px 12px;
border-radius:10px;
cursor:pointer;
font-size:13px;
}

.closePDF:hover{
background:#dc2626;
}
/* SIDEBAR */

.sidebar{
width:260px;
height:100vh;
position:fixed;
top:0;
left:0;
background:#ffffff;
border-right:1px solid #e5e7eb;
padding:25px;
box-sizing:border-box;
overflow-y:auto;
overflow-x:visible;
z-index:100;
box-shadow:2px 0 12px rgba(0,0,0,0.05);
}

.sidebar h2{
margin-top:0;
font-size:20px;
font-weight:600;
color:#374151;
margin-bottom:25px;
}

/* MENU ITEM */

.menu-item{
  display:flex;
  align-items:center;
  gap:12px;
  padding:11px 14px;
  margin-bottom:7px;
  color:#374151;
  font-size:16px;
  border-radius:15px;
  font-weight:600;
  cursor:pointer;
  transition:all 0.15s cubic-bezier(0, 0, 0.2, 1);
  position:relative;
}

/* hiệu ứng hover mới */
.menu-item:hover{
  background:#e4ecff;
  color:#1E5DFE;
}

/* icon cũng đổi nhẹ */
.menu-item:hover i{
  color:#1E5DFE;
}

/* active giữ nổi bật hơn hover */
.menu-item.active{
  background:#1E5DFE;
  color:white;
}

.menu-item.active i{
  color:white;
}

.menu-item.active::before{
  height:60%;
  background:#1E5DFE; /* giữ xanh */
}

/* DROPDOWN */
  
.dropdown{
  display:flex;
  align-items:center;
}
  
.dropdown .caret{
  margin-left:auto; /* 👈 đẩy caret sang phải */
}
.dropdown span{
display:flex;
align-items:center;
gap:12px;
}

.caret{
transition:transform .25s ease;
font-size:13px;
}

.dropdown.open .caret{
transform:rotate(90deg);
}

/* SUBMENU - Menu Phân loại */

.submenu{
margin-left:18px;
overflow:hidden;
max-height:300px;
transition:max-height .28s ease;
}

.submenu.hide{
max-height:0;
}

.submenu a{  
  display:flex;
  align-items:center;
  gap:12px;
  font-size:15px;
  font-weight:500;
  padding:8px 12px;
  margin-bottom:7px;
  border-radius:15px;
  color:#374151;
  text-decoration:none;
  position:relative;
  transition:all 0.15s cubic-bezier(0.22, 0.61, 0.36, 1)
}
  
.submenu a i{
  width:24px;
  min-width:24px;
  text-align:center;

  font-size:22px;     /* 👈 gần bằng menu chính */
  color:#374151;      /* 👈 đậm giống text */
  opacity:1;
}

/* hover đồng bộ với menu chính */
.submenu a:hover{
  background:#e4ecff;
  color:#1E5DFE;
}

/* icon hover */
.submenu a:hover i{
  color:#1E5DFE;
}

/* active */
.submenu a.active{
  background:#1E5DFE;
  color:white;
}

.submenu a.active i{
  color:white;
}

/* CONTENT */
  
.content h1{
font-size:30px;
font-weight:700;
margin-bottom:15px;
color:#1E5DFE;
text-transform:uppercase;
letter-spacing:.5px;
}

.content{
  margin-left:260px;
  padding:35px;
  width:calc(100% - 260px);
  box-sizing:border-box;
}

/* SEARCH */

.searchBox{
  margin-bottom:15px;
  position:relative;
  max-width:430px;
}

/* icon trái */
.searchBox > i:not(.clearSearch){
  position:absolute;
  left:12px;
  top:50%;
  transform:translateY(-50%);
  font-size:18px;
  color:#9ca3af;
  pointer-events:none;
}

/* icon X bên phải */
.clearSearch{
  position:absolute;
  right:12px;
  top:50%;
  transform:translateY(-50%);
  font-size:18px;
  color:#9ca3af;
  cursor:pointer;
  display:none;
}

/* hover cho nút X trong ô search*/
.clearSearch:hover{
  color:#f97316; /* 🔥 đỏ cam (orange-500) */
  transform:translateY(-50%) scale(1.1);
}
  
.searchBox input{
  width:100%;
  padding:10px 40px 10px 40px;  /* 👈 cân 2 bên */
  border:1px solid #ddd;
  border-radius:10px;
  font-size:14px;
  background:white;
  transition:.25s;
  box-sizing:border-box;
}

.searchBox input:hover{
border-color:#a5b4fc;
}

.searchBox input:focus{
outline:none;
border-color:#1E5DFE;
box-shadow:0 0 0 3px rgba(30,93,254,.15);
}

/* TABLE */

table{
width:100%;
border-collapse:collapse;
background:white;
table-layout:auto;
min-width:900px;
font-size:15px;
}
  
.tableCard{
background:white;
border-radius:15px;
box-shadow:0 6px 20px rgba(0,0,0,0.06);
overflow:hidden;
border:1px solid #eee;
}

/* Padding cho nội dung các dòng dữ liệu */
td {
    padding: 9px 6px; 
    vertical-align: middle; /* Căn giữa theo chiều dọc để text đẹp hơn */
}

/* Padding riêng cho hàng tiêu đề */
th {
    padding: 12px 8px; /* Tăng từ 8px lên 15px để tiêu đề rộng ra */
    font-size: 15px;
}

td:nth-child(3){
max-width:0;
}

th{
background:#1E5DFE;
color:white;
font-weight:600;
}
  
.tableFooter{
display:flex;
justify-content:space-between;
align-items:center;
margin-top:20px;
flex-wrap:wrap;
gap:10px;
}

.pageInfo{
font-size:14px;
color:#6b7280;
}
  
/* Không có dữ liệu*/
.noData{
text-align:center;
padding:40px 10px;
color:#6b7280;
font-size:15px;
}

/* WIDTH - Độ rộng cột phần nội dung*/

th:nth-child(1),td:nth-child(1){width:4%;text-align:center;}   /* STT */
th:nth-child(2),td:nth-child(2){width:7%;}                     /* Số ký hiệu */
th:nth-child(3),td:nth-child(3){width:41%;}                     /* Trích yếu */
th:nth-child(4),td:nth-child(4){width:10%;text-align:center;}   /* Ngày ban hành */
th:nth-child(5),td:nth-child(5){width:10%;text-align:center;}   /* Ngày hiệu lực */
th:nth-child(6),td:nth-child(6){width:10%;text-align:center;}   /* Cơ quan */
th:nth-child(7),td:nth-child(7){width:8%;text-align:center;}    /* Trạng thái */
th:nth-child(8),td:nth-child(8){width:10%;text-align:center;}    /* Files */

a{
color:#1E5DFE;
text-decoration:none;
font-weight:500;
}

a:hover{
text-decoration:none;
}

/* ROW HOVER */

tbody tr{
cursor:pointer;
transition:background .18s ease, transform .12s ease;
border-bottom:1px solid #e5e7eb; /* line xám mờ chuẩn */
}

tbody tr:last-child{
border-bottom:none;
}

tbody tr:hover{
background:#f8faff;
transform:none;
box-shadow:none;
}

tbody tr:hover td{
color:#374151;
}

tbody tr:hover td:nth-child(-n+6){
color:#1E5DFE;   /* xanh */
}

tbody tr:hover td:nth-child(-n+6){
color:#1E5DFE;
}

/* giữ hover khi đang xem PDF */

tbody tr.activeRow{
background:#f3f4f6;
box-shadow:0 2px 6px rgba(0,0,0,0.05);
}

tbody tr.activeRow td:nth-child(-n+4){
color:#1E5DFE;
}

/* CONTAINER */
.pagination{
margin-top:20px;
display:flex;
justify-content:center;
}

/* nút */
.page-btn{
width:30px;
height:36px;

display:flex;
align-items:center;
justify-content:center;

border-radius:13px;
cursor:pointer;

font-size:14px;
font-weight:500;

color:#64748b;
background:transparent;

transition:all .2s ease;
}

/* hover */
.page-btn:hover{
background:#e0e7ff;
color:#1E5DFE;
}

/* ACTIVE (đẹp + không méo) */
.page-btn.active{
background:#1E5DFE;
color:white;

box-shadow:0 6px 14px rgba(30,93,254,.25);

/* ❌ bỏ scale */
transform:none;
}

/* STATUS */

.status-ok{
background:#22c55e;
color:white;
padding:3px 10px;
border-radius:999px;
font-size:11.5px;
font-weight:500;
display:inline-block;
}
  
.status-edit{
background:#f59e0b;
color:white;
padding:3px 10px;
border-radius:999px;
font-size:11.5px;
font-weight:500;
display:inline-block;
position:relative;
}
  
.status-x{
background:#ef4444;
color:white;
padding:3px 10px;
border-radius:999px;
font-size:11.5px;
font-weight:500;
display:inline-block;
position:relative;
}

.status-x:hover::after,
.status-edit:hover::after{
content:attr(data-tooltip);
position:absolute;
bottom:125%;
left:50%;
transform:translateX(-50%);
background:#374151;
color:#fff;
padding:8px 12px;
border-radius:8px;
font-size:12px;
max-width:260px;
width:max-content;
white-space:normal;
line-height:1.4;
text-align:center;
z-index:100;
}
  
.status-ok,
.status-x{
white-space:nowrap;
}

/* ICON FILE WORD */
.file-doc{
  font-size:26px;
  color:#9ca3af;
  display:inline-block; /* 👈 QUAN TRỌNG */
  transition: transform .2s cubic-bezier(.4,0,.2,1), color .2s ease;
  transform-origin:center;
  will-change:transform;
}

/* hover */
td a:hover .file-doc{
  color:#1E5DFE;
  transform:scale(1.15);
}
  
/* PDF VIEWER */

#pdfViewerSection{
margin-top:40px;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 4px 12px rgba(0,0,0,.06);
display:none;
}

#pdfViewerSection h2{
margin-top:0;
font-size:22px;
color:#374151;
}

#pdfViewer{
width:100%;
height:800px;
border:1px solid #e5e7eb;
border-radius:10px;
}
  
/* PDF POPUP */

#pdfModal{
display:none;
position:fixed;
z-index:1000;
left:0;
top:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.55);
justify-content:center;
align-items:center;
opacity:0;
transition:opacity .25s ease;
}

#pdfModal.show{
display:flex;
opacity:1;
}

.pdfModalContent{
background:white;
width:85%;
height:85%;
border-radius:10px;
padding:15px;
display:flex;
flex-direction:column;
box-shadow:0 15px 50px rgba(0,0,0,0.3);
transform:scale(.92);
transition:transform .25s ease;
}

#pdfModal.show .pdfModalContent{
transform:scale(1);
}

.pdfModalHeader{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:10px;
}

.pdfModalHeader h2{
margin:0;
font-size:18px;
}

.pdfButtons{
display:flex;
gap:8px;
}

.closePDF,
.fullscreenPDF{
border:none;
padding:6px 12px;
border-radius:10px;
cursor:pointer;
font-size:13px;
}

.closePDF{
background:#ef4444;
color:white;
}

.closePDF:hover{
background:#dc2626;
}

.fullscreenPDF{
background:#1E5DFE;
color:white;
}

.fullscreenPDF:hover{
background:#1749c6;
}

#pdfViewer{
flex:1;
width:100%;
border:1px solid #e5e7eb;
border-radius:10px;
}

/* Sidebar header */

.sidebarHeader{
display:flex;
align-items:center;
position:relative; /* 👈 thêm */
justify-content:space-between;
margin-bottom:25px;
}
  
@media (max-width:900px){
  .sidebar{
    width:260px; /* giữ nguyên */
    padding:25px;
  }

  .sidebar h2{
    display:block;
  }

  .sidebar .menu-item span{
    display:inline;
  }

  .sidebar .submenu{
    display:block;
  }

  .sidebar .menu-item{
    justify-content:flex-start;
  }
}
  
.noDataRow{
cursor:default !important;
}

.noDataRow:hover{
background:white !important;
transform:none !important;
box-shadow:none !important;
}

.noDataRow:hover td{
color:#6b7280 !important;
font-weight:normal !important;
}

/* SKELETON - Hiệu ứng load dữ liệu*/

.skeleton{
position:relative;
overflow:hidden;
background:#e5e7eb;
border-radius:6px;
}

/* shimmer effect */
.skeleton::after{
content:"";
position:absolute;
top:0;
left:-100%;
width:100%;
height:100%;
background:linear-gradient(
90deg,
transparent,
rgba(255,255,255,0.5),
transparent
);
animation:skeleton-loading 1.2s infinite;
}

@keyframes skeleton-loading{
100%{
left:100%;
}
}

/* row skeleton */
.skeleton-row td{
padding:10px;
}

.skeleton-box{
height:12px;
border-radius:4px;
}

/* FOOTER SIDEBAR */

.sidebarFooter{
margin-top:25px;
padding-top:15px;
border-top:1px solid #e5e7eb;

font-size:13px;
color:#6b7280;

display:flex;
flex-direction:column;
gap:6px;
}

.sidebarFooter b{
color:#374151;
font-weight:600;
}

/* ===== SIDEBAR TOGGLE ===== */

.sidebar{
  width:260px;
  transition:width .32s cubic-bezier(.4,0,.2,1), padding .3s;
  will-change:width;
}

/* trạng thái thu gọn */
.sidebar.collapsed{
  width:78px;
  padding:25px 10px;
}

/* CONTENT co giãn */
.content{
  transition:all .32s cubic-bezier(.4,0,.2,1);
}

.sidebar.collapsed ~ .content{
  margin-left:78px;
  width:calc(100% - 78px);
}

/* Ẩn chữ mượt */
.sidebar h2,
.sidebar .menu-item span,
.sidebar .submenu span,
.sidebar .sidebarFooter{
  transition:opacity .2s ease, transform .2s ease;
}

.sidebar.collapsed h2,
.sidebar.collapsed .menu-item span,
.sidebar.collapsed .submenu span{
  display:none;
}

/* Sidebar khi thu gọn */
.sidebar.collapsed .menu-item{
  justify-content:center;
  align-items:center;
  padding:12px 0;   /* 👈 FIX CÂN GIỮA */
  gap:0;            /* 👈 XÓA khoảng cách */
}
  
.sidebar.collapsed .menu-item i,
.sidebar.collapsed .submenu a i{
  margin:0;
  display:block;
}

.sidebar.collapsed .submenu a{
  justify-content:center;
  align-items:center;
  padding:12px 0;
  gap:0;
}


.sidebar.collapsed .menu-item.active,
.sidebar.collapsed .submenu a.active{
  border-radius:18px;
  display:flex;
  justify-content:center;
  align-items:center;
}
  
.sidebar.collapsed .dropdown i:first-child{
  margin:0;
  display:block;
}
  
.sidebar.collapsed .dropdown{
  justify-content:center;
  padding:12px 0;
  gap:0;
}
  
/* ẩn submenu */
.sidebar.collapsed .submenu{
  display:block !important;
  max-height:none !important;
}

/* Ẩn nút mũi tên cạnh Phân loại khi collapsed */
.sidebar.collapsed .dropdown .caret{
  display:none;
}
  
/* Ẩn thống kê khi collapsed */
.sidebar.collapsed .sidebarFooter{
  display:none;
}
/* ===== NÚT TOGGLE ===== */

.toggleBtn{
  position:absolute;   /* 👈 FIX CỨNG */
  right:10px;
  top:50%;
  transform:translateY(-50%);
  
  font-size:16px;
  cursor:pointer;
  color:#6b7280;
  transition:.3s ease;
}

.toggleBtn:hover{
  color:#1E5DFE;
  transform:scale(1.1);
}

/* xoay mũi tên */
.sidebar.collapsed .toggleBtn{
  transform:translateY(-50%) rotate(180deg); /* 👈 giữ vị trí + xoay */
}

/* TOOLTIP collapsed */
.sidebar.collapsed .menu-item::after,
.sidebar.collapsed .submenu a::after{
  content:attr(data-title);
  position:fixed;
  left:76px;
  top:var(--tooltip-top);
  background:#374151;
  color:#fff;
  padding:6px 10px;
  border-radius:6px;
  font-size:12px;
  white-space:nowrap;
  z-index:9999;
  opacity:0; /* 👈 luôn ẩn mặc định */
  pointer-events:none;
}

/* 👇 CHỈ hiện khi đã có vị trí */
.sidebar.collapsed .menu-item.tooltip-ready:hover::after,
.sidebar.collapsed .submenu a.tooltip-ready:hover::after{
  opacity:1;
  transform:translateY(-50%) translateX(0);
  transition-delay:1.15s; /* tùy chỉnh */
}
  
/* icon file */
.file-icon{
  font-size:16px;
}

/* ===== ICON SIZE CHUẨN ===== */

/* menu chính */
.menu-item i{
  font-size:24px;
}

/* submenu */
.submenu a i{
  font-size:20px;
}

/* search */
.searchBox i{
  font-size:18px;
}

/* pagination */
.page-btn i{
  font-size:20px;
}

/* file */
.file-icon{
  font-size:27px;
}
  
.searchBox .clearSearch:hover{
  color:#f97316 !important;
}
  
/* hover giống style cũ */
.menu-item:hover .ti,
.submenu a:hover .ti{
  stroke:#1E5DFE;
}

/* active */
.menu-item.active .ti,
.submenu a.active .ti{
  stroke:white;
}
  
</style>
</head>

<body>

<div class="sidebar">
<div class="sidebarHeader">
  <h2 class="sidebarTitle">📚 Pháp lý đấu thầu</h2>
  <i class="ti ti-chevron-left toggleBtn" onclick="toggleSidebar()"></i>
</div>
<!-- Tổng hợp -->

<div class="menu-item active" data-title="Tổng hợp" onclick="setActive(this);filterDocs('all')">
<i class="ti ti-layout-grid"></i>
<span>Tổng hợp</span>
</div>

<!-- Phân loại -->

<div class="menu-item dropdown open" data-title="Phân loại" onclick="toggleMenu(this)">
  <i class="ti ti-filter"></i>
  <span>Phân loại</span>
  <i class="ti ti-chevron-right caret"></i>
</div>

<!-- Submenu -->

<div class="submenu">

<a href="#" data-title="Luật" onclick="setActive(this);filterDocs('luat')">
<i class="ti ti-gavel"></i>
<span>Luật</span>
</a>

<a href="#" data-title="Nghị định" onclick="setActive(this);filterDocs('nghidinh')">
<i class="ti ti-clipboard-text"></i>
<span>Nghị định</span>
</a>

<a href="#" data-title="Thông tư" onclick="setActive(this);filterDocs('thongtu')">
<i class="ti ti-file-description"></i>
<span>Thông tư</span>
</a>

</div>

<!-- Nội bộ -->

<div class="menu-item" data-title="Tài liệu nội bộ" onclick="setActive(this);filterDocs('noibo')">
<i class="ti ti-folder-open"></i>
<span>Tài liệu nội bộ</span>
</div>

<!-- ✅ THÊM ĐOẠN NÀY -->
<div class="sidebarFooter">
  <div>Tổng số văn bản: <b id="totalDocs">...</b></div>
  <div>Tổng lượt truy cập: <b id="totalViews">...</b></div>
</div>

</div>

<div class="content">

<h1>Danh sách văn bản</h1>

<div class="searchBox">
<i class="ti ti-search"></i>
<input id="searchInput"
type="text"
placeholder="Tìm số hoặc tên văn bản..."
onkeyup="searchDocs(this.value);toggleClearBtn()">
<i class="ti ti-x clearSearch" onclick="clearSearch()"></i>
</div>

<div class="tableCard">

<table>
<thead>
<tr>
<th>STT</th>
<th>Số ký hiệu</th>
<th>Trích yếu</th>
<th>Ngày ban hành</th>
<th>Ngày hiệu lực</th>
<th>Cơ quan ban hành</th>
<th>Trạng thái</th>
<th>Files</th>
</tr>
</thead>

<tbody id="docTable"></tbody>

</table>

</div>
  
<div class="tableFooter">
<div class="pageInfo" id="pageInfo"></div>
</div>
<div class="pagination" id="pagination"></div>

<script>

/* SIDEBAR */

function toggleMenu(el){

el.classList.toggle("open");

const submenu=el.nextElementSibling;

submenu.classList.toggle("hide");

}

function setActive(el){

document.querySelectorAll(".menu-item").forEach(i=>i.classList.remove("active"));
document.querySelectorAll(".submenu a").forEach(i=>i.classList.remove("active"));

if(el.classList.contains("menu-item")) el.classList.add("active");
if(el.tagName==="A") el.classList.add("active");

}
  
function toggleSidebar(){
document.querySelector(".sidebar").classList.toggle("collapsed");
}

/* DATA */

let allDocs=[];
let filteredDocs=[];
let currentPage=1;
const rowsPerPage=20;

function parseDate(dateStr){
if(!dateStr)return new Date(0);
let parts=dateStr.split("/");
return new Date(parts[2],parts[1]-1,parts[0]);
}

/* hiển thị skeleton trước */
renderSkeleton();

fetch("https://opensheet.elk.sh/15t10NKlFARFJK0Fqx66R2qxTCKXZn_tjVJfQ-5lUMQI/Sheet1")
.then(res=>res.json())
.then(data=>{
    allDocs = data.sort((a,b)=>parseDate(b.ngay)-parseDate(a.ngay));
    filteredDocs = allDocs.filter(doc => doc.type !== "noibo");
    document.getElementById("totalDocs").innerText = allDocs.length;
    renderTable();
})
.catch(err=>{
    console.error(err);
});

/* SKELETON */

function renderSkeleton(){
let html="";

for(let i=0;i<8;i++){
html+=`
<tr class="skeleton-row">
<td><div class="skeleton skeleton-box" style="width:20px;"></div></td>
<td><div class="skeleton skeleton-box" style="width:80px;"></div></td>
<td><div class="skeleton skeleton-box" style="width:100%;"></div></td>
<td><div class="skeleton skeleton-box" style="width:70px;"></div></td>
<td><div class="skeleton skeleton-box" style="width:70px;"></div></td>
<td><div class="skeleton skeleton-box" style="width:90px;"></div></td>
<td><div class="skeleton skeleton-box" style="width:60px;"></div></td>
<td><div class="skeleton skeleton-box" style="width:30px;"></div></td>
</tr>
`;
}

document.getElementById("docTable").innerHTML=html;
}
  
function renderTable(){
if(filteredDocs.length===0){
document.getElementById("docTable").innerHTML=
`<tr class="noDataRow">
<td colspan="8" class="noData">
<i class="ti ti-search"></i>
 Không tìm thấy dữ liệu
</td>
</tr>`;

document.getElementById("pageInfo").innerText="";
document.getElementById("pagination").innerHTML="";
return;
}

let start=(currentPage-1)*rowsPerPage;
let end=start+rowsPerPage;

let rows=filteredDocs.slice(start,end);

let html="";

rows.forEach((doc,index)=>{

let stt=start+index+1;

let status="";

if(doc.trangthai==="OK"){
status=`<span class="status-ok">Còn hiệu lực</span>`;
}

else if(doc.trangthai==="S"){
let note = doc.ghichu || "Thông tin sửa đổi đang được cập nhật";
status=`<span class="status-edit" data-tooltip="${note}">Đã sửa đổi</span>`;
}

else if(doc.trangthai==="X"){
let note=doc.ghichu || "Thông tin đang được cập nhật";
status=`<span class="status-x" data-tooltip="${note}">Hết hiệu lực</span>`;
}

html+=`
<tr onclick="openPDF('${doc.linkpdf}', this)">

<td>${stt}</td>

<td>${doc.so||""}</td>

<td>${doc.ten||""}</td>

<td>${doc.ngay||""}</td>

<td>${doc.hieuluc||""}</td>

<td>${doc.coquan||""}</td>

<td>${status}</td>

<td>
${doc.linkword?
`<a href="${doc.linkword}" target="_blank" onclick="event.stopPropagation();">
<i class="ti ti-file-type-docx file-doc"></i>
</a>`
:""}
</td>

</tr>
`;
});

document.getElementById("docTable").innerHTML=html;
let startItem=start+1;
let endItem=Math.min(end, filteredDocs.length);
document.getElementById("pageInfo").innerText=
`Hiển thị ${startItem}-${endItem} / ${filteredDocs.length} văn bản`;
renderPagination();
}
  
function openPDF(url,row){
if(!url) return;
url=url.replace("/view","/preview");
const viewer=document.getElementById("pdfViewer");
viewer.src=url;
  
/* highlight row */
  
document.querySelectorAll("#docTable tr").forEach(tr=>{
tr.classList.remove("activeRow");
});
row.classList.add("activeRow");
/* mở popup */

document.getElementById("pdfModal").classList.add("show");
}
  
function closePDF(){

const viewer=document.getElementById("pdfViewer");

viewer.src="";

document.getElementById("pdfModal").classList.remove("show");

/* bỏ highlight */
document.querySelectorAll("#docTable tr").forEach(tr=>{
tr.classList.remove("activeRow");
});
}
  
function renderPagination(){
  let totalPages = Math.ceil(filteredDocs.length / rowsPerPage);
  let html = "";

  if(totalPages <= 1){
    document.getElementById("pagination").innerHTML = "";
    return;
  }

  // ===== PREV =====
  html += `<div class="page-btn" onclick="changePage(${currentPage - 1})">
    <i class="ti ti-chevron-left"></i>
  </div>`;

  let maxVisible = 10;
  let start = Math.max(1, currentPage - Math.floor(maxVisible / 2));
  let end = start + maxVisible - 1;

  if(end > totalPages){
    end = totalPages;
    start = Math.max(1, end - maxVisible + 1);
  }

  // ===== Trang đầu + ... =====
  if(start > 1){
    html += `<div class="page-btn" onclick="changePage(1)">1</div>`;
    if(start > 2){
      html += `<div class="page-btn">...</div>`;
    }
  }

  // ===== Các trang chính =====
  for(let i = start; i <= end; i++){
    html += `<div class="page-btn ${i === currentPage ? 'active' : ''}" onclick="changePage(${i})">${i}</div>`;
  }

  // ===== ... + Trang cuối =====
  if(end < totalPages){
    if(end < totalPages - 1){
      html += `<div class="page-btn">...</div>`;
    }
    html += `<div class="page-btn" onclick="changePage(${totalPages})">${totalPages}</div>`;
  }

  // ===== NEXT =====
  html += `<div class="page-btn" onclick="changePage(${currentPage + 1})">
    <i class="ti ti-chevron-right"></i>
  </div>`;

  document.getElementById("pagination").innerHTML = html;
}

function changePage(page){
let totalPages=Math.ceil(filteredDocs.length/rowsPerPage);
if(page<1) page=1;
if(page>totalPages) page=totalPages;
currentPage=page;
renderTable();

/* 👉 thêm đoạn này */
window.scrollTo({
top:0,
behavior:"smooth"
});
}

function filterDocs(type){
if(type==="all"){
    // ❌ loại bỏ "noibo"
    filteredDocs = allDocs.filter(doc => doc.type !== "noibo");
}
else{
    filteredDocs = allDocs.filter(doc => doc.type === type);
}
currentPage=1;
renderTable();
}

function searchDocs(keyword){
keyword=keyword.toLowerCase();
filteredDocs=allDocs.filter(doc=>
(doc.so && doc.so.toLowerCase().includes(keyword)) ||
(doc.ten && doc.ten.toLowerCase().includes(keyword))
);
currentPage=1;
renderTable();
}

function toggleClearBtn(){
const input=document.getElementById("searchInput");
const btn=document.querySelector(".clearSearch");
btn.style.display=input.value ? "block" : "none";
}
  
function clearSearch(){
const input=document.getElementById("searchInput");
input.value="";
toggleClearBtn();
filteredDocs=allDocs;
currentPage=1;
renderTable();
input.focus();
}

window.addEventListener("load",function(){

const code='lytrunghuyen';

const url=`https://${code}.goatcounter.com/counter/TOTAL.json`;

fetch(url)
.then(r=>r.json())
.then(data=>{
let actual=parseInt(data.count.replace(/[^0-9]/g,''))||0;
document.getElementById("totalViews").innerText=(actual*5).toLocaleString();
})
.catch(()=>{
document.getElementById("visitor-count").innerText="---";
});

});
  
function fullscreenPDF(){
const iframe=document.getElementById("pdfViewer");
if(iframe.requestFullscreen){
iframe.requestFullscreen();
}
else if(iframe.webkitRequestFullscreen){
iframe.webkitRequestFullscreen();
}
else if(iframe.msRequestFullscreen){
iframe.msRequestFullscreen();
}
}

// FIX tooltip position
document.querySelectorAll('.menu-item, .submenu a').forEach(el=>{
  el.addEventListener('mouseenter', function(){
    const rect = this.getBoundingClientRect();

    this.style.setProperty('--tooltip-top', rect.top + rect.height/2 + 'px');

    // 👇 đánh dấu đã sẵn sàng
    this.classList.add('tooltip-ready');
  });

  el.addEventListener('mouseleave', function(){
    this.classList.remove('tooltip-ready');
  });
});

</script>
<div id="pdfModal" onclick="if(event.target.id==='pdfModal') closePDF()">
<div class="pdfModalContent">
<div class="pdfModalHeader">
  
<h2>📄 Xem văn bản</h2>

<div class="pdfButtons">
<button class="fullscreenPDF" onclick="fullscreenPDF()">Toàn màn hình</button>
<button class="closePDF" onclick="closePDF()">Đóng ✕</button>
</div>
</div>
<iframe id="pdfViewer" src="" frameborder="0"></iframe>
</div>
  
<script>
</script>
  
</body>
</html>
