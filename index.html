<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Thư viện văn bản đấu thầu</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600&display=swap" rel="stylesheet">

<style>

body{
font-family:'Montserrat',sans-serif;
margin:0;
display:flex;
background:#f8f9fb;
}

/* SIDEBAR */

.sidebar{
width:260px;
background:#f2f3f5;
height:100vh;
padding:25px;
border-right:1px solid #e5e7eb;
}

.sidebar h2{
margin-top:0;
font-size:20px;
font-weight:600;
color:#374151;
margin-bottom:25px;
}

.sidebar a{
display:flex;
align-items:center;
gap:10px;
padding:12px 14px;
margin-bottom:6px;
color:#374151;
text-decoration:none; /* bỏ gạch chân */
font-size:17px;
border-radius:10px;
}

.sidebar a:hover{
background:#ede9fe;
color:#7c3aed;
text-decoration:none; /* đảm bảo không có gạch chân */
}

.sidebar a.active{
background:#e9d5ff;
color:#7c3aed;
font-weight:600;
}

/* CONTENT */

.content{
flex:1;
padding:35px;
}

/* SEARCH */

.searchBox{
margin-bottom:15px;
}

.searchBox input{
width:300px;
padding:10px 12px;
border:1px solid #ddd;
border-radius:8px;
font-size:14px;
}

/* TABLE */

table{
width:100%;
border-collapse:collapse;
background:white;
table-layout:fixed;
}

th,td{
border-bottom:1px solid #eee;
padding:14px;
text-align:left;
vertical-align:top;
word-wrap:break-word;
word-break:break-word;
}

th{
background:#6e35e8;
color:white;
}

/* FIX WIDTH */

th:nth-child(1), td:nth-child(1){
width:160px;
}

th:nth-child(2), td:nth-child(2){
width:auto;
}

th:nth-child(3), td:nth-child(3){
width:120px;
}

th:nth-child(4), td:nth-child(4){
width:120px;
}

a{
color:#6e35e8;
text-decoration:none;
font-weight:500;
}

a:hover{
text-decoration:underline;
}

/* PAGINATION */

.pagination{
margin-top:20px;
display:flex;
gap:6px;
flex-wrap:wrap;
}

.page-btn{
padding:6px 10px;
border:1px solid #ddd;
cursor:pointer;
border-radius:6px;
background:white;
}

.page-btn.active{
background:#6e35e8;
color:white;
border:none;
}

</style>

</head>

<body>

<div class="sidebar">

<h2>📚 Văn bản</h2>

<a href="#" onclick="filterDocs('all')">
<i class="fa-regular fa-folder"></i>
Trang chủ
</a>

<a href="#" onclick="filterDocs('luat')">
<i class="fa-regular fa-id-badge"></i>
Luật
</a>

<a href="#" onclick="filterDocs('nghidinh')">
<i class="fa-regular fa-file-lines"></i>
Nghị định
</a>

<a href="#" onclick="filterDocs('thongtu')">
<i class="fa-regular fa-file"></i>
Thông tư
</a>

<a href="#" onclick="filterDocs('huongdan')">
<i class="fa-regular fa-bookmark"></i>
Hướng dẫn
</a>

</div>

<div class="content">

<h1>Danh sách văn bản</h1>

<div class="searchBox">
<input type="text" placeholder="Tìm số hoặc tên văn bản..." onkeyup="searchDocs(this.value)">
</div>

<table>

<thead>
<tr>
<th>Số văn bản</th>
<th>Tên</th>
<th>Ngày</th>
<th>Link</th>
</tr>
</thead>

<tbody id="docTable">
</tbody>

</table>

<div class="pagination" id="pagination"></div>

</div>

<script>

let allDocs=[];
let filteredDocs=[];
let currentPage=1;
const rowsPerPage=50;

/* LOAD DATA */

fetch("https://opensheet.elk.sh/15t10NKlFARFJK0Fqx66R2qxTCKXZn_tjVJfQ-5lUMQI/Sheet1")
.then(res=>res.json())
.then(data=>{

allDocs=data;
filteredDocs=data;

renderTable();

});

/* RENDER TABLE */

function renderTable(){

let start=(currentPage-1)*rowsPerPage;
let end=start+rowsPerPage;

let rows=filteredDocs.slice(start,end);

let html="";

rows.forEach(doc=>{

html+=`
<tr>
<td>${doc.so}</td>
<td>${doc.ten}</td>
<td>${doc.ngay}</td>
<td><a href="${doc.link}" target="_blank">Xem PDF</a></td>
</tr>
`;

});

document.getElementById("docTable").innerHTML=html;

renderPagination();

}

/* PAGINATION */

function renderPagination(){

let totalPages=Math.ceil(filteredDocs.length/rowsPerPage);

let html="";

for(let i=1;i<=totalPages;i++){

html+=`<div class="page-btn ${i===currentPage?'active':''}" onclick="changePage(${i})">${i}</div>`;

}

document.getElementById("pagination").innerHTML=html;

}

function changePage(page){

currentPage=page;
renderTable();

}

/* FILTER */

function filterDocs(type){

if(type==="all"){

filteredDocs=allDocs;

}else{

filteredDocs=allDocs.filter(doc=>doc.type===type);

}

currentPage=1;

renderTable();

}

/* SEARCH */

function searchDocs(keyword){

keyword=keyword.toLowerCase();

filteredDocs=allDocs.filter(doc=>

(doc.so && doc.so.toLowerCase().includes(keyword)) ||
(doc.ten && doc.ten.toLowerCase().includes(keyword))

);

currentPage=1;

renderTable();

}

</script>

</body>
</html>
