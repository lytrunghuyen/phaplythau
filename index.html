<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Thư viện văn bản đấu thầu</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600&display=swap"
rel="stylesheet">

<style>

body{
font-family:'Montserrat',sans-serif;
margin:0;
display:flex;
background:#f8f9fb;
color:#374151;
}

/* SIDEBAR */

.sidebar{
width:260px;
background:#f3f4f6;
height:100vh;
padding:25px;
border-right:1px solid #e5e7eb;
position:sticky;
top:0;
}

.sidebar h2{
margin-top:0;
font-size:20px;
font-weight:600;
margin-bottom:25px;
}

.sidebar a{
display:flex;
align-items:center;
gap:12px;
padding:12px 14px;
margin-bottom:6px;
text-decoration:none;
font-size:16px;
border-radius:10px;
color:#374151;
transition:.2s;
}

.sidebar a:hover{
background:#ede9fe;
color:#7c3aed;
transform:translateX(2px);
}

/* CONTENT */

.content{
flex:1;
padding:35px;
}

/* HEADER */

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

.header h1{
font-size:24px;
margin:0;
}

/* SEARCH */

.searchBox{
position:relative;
}

.searchBox i{
position:absolute;
left:12px;
top:50%;
transform:translateY(-50%);
color:#9ca3af;
}

.searchBox input{
padding:10px 12px 10px 34px;
border-radius:8px;
border:1px solid #ddd;
font-size:14px;
width:280px;
transition:.2s;
}

.searchBox input:focus{
outline:none;
border-color:#7c3aed;
box-shadow:0 0 0 3px rgba(124,58,237,0.15);
}

/* TABLE */

table{
width:100%;
border-collapse:collapse;
background:white;
border-radius:10px;
overflow:hidden;
}

thead th{
background:#6e35e8;
color:white;
padding:14px;
text-align:left;
position:sticky;
top:0;
z-index:5;
}

td{
padding:14px;
border-bottom:1px solid #eee;
}

tbody tr{
cursor:pointer;
transition:.15s;
}

tbody tr:hover{
background:#f9fafb;
}

/* BADGE */

.badge{
font-size:11px;
padding:3px 7px;
border-radius:5px;
color:white;
margin-right:6px;
}

.badge.luat{background:#ef4444;}
.badge.nghidinh{background:#f59e0b;}
.badge.thongtu{background:#3b82f6;}
.badge.huongdan{background:#10b981;}

/* MARK SEARCH */

mark{
background:#fde68a;
padding:1px 3px;
border-radius:3px;
}

/* PAGINATION */

.pagination{
margin-top:20px;
display:flex;
gap:6px;
flex-wrap:wrap;
}

.page-btn{
padding:6px 10px;
border:1px solid #ddd;
border-radius:6px;
cursor:pointer;
background:white;
}

.page-btn.active{
background:#6e35e8;
color:white;
border:none;
}

</style>
</head>

<body>

<div class="sidebar">

<h2>📚 Văn bản</h2>

<a href="#" onclick="filterDocs('all')">
<i class="fa-solid fa-folder"></i>Trang chủ
</a>

<a href="#" onclick="filterDocs('luat')">
<i class="fa-solid fa-scale-balanced"></i>Luật
</a>

<a href="#" onclick="filterDocs('nghidinh')">
<i class="fa-solid fa-file-lines"></i>Nghị định
</a>

<a href="#" onclick="filterDocs('thongtu')">
<i class="fa-solid fa-file"></i>Thông tư
</a>

<a href="#" onclick="filterDocs('huongdan')">
<i class="fa-solid fa-bookmark"></i>Hướng dẫn
</a>

</div>

<div class="content">

<div class="header">

<h1 id="title">Danh sách văn bản</h1>

<div class="searchBox">
<i class="fa-solid fa-magnifying-glass"></i>
<input type="text"
placeholder="Tìm số hoặc tên văn bản..."
onkeyup="searchDocs(this.value)">
</div>

</div>

<table>

<thead>
<tr>
<th>Số ký hiệu</th>
<th>Trích yếu</th>
<th>Ngày ban hành</th>
<th>Word</th>
</tr>
</thead>

<tbody id="docTable"></tbody>

</table>

<div class="pagination" id="pagination"></div>

</div>

<script>

let allDocs=[];
let filteredDocs=[];
let currentPage=1;
const rowsPerPage=25;

function parseDate(dateStr){
let p=dateStr.split("/");
return new Date(p[2],p[1]-1,p[0]);
}

/* LOAD DATA */

fetch("https://opensheet.elk.sh/15t10NKlFARFJK0Fqx66R2qxTCKXZn_tjVJfQ-5lUMQI/Sheet1")
.then(res=>res.json())
.then(data=>{

allDocs=data.sort((a,b)=>parseDate(b.ngay)-parseDate(a.ngay));
filteredDocs=allDocs;

renderTable();

});

/* HIGHLIGHT SEARCH */

function highlight(text,keyword){

if(!keyword) return text;

let reg=new RegExp(keyword,"gi");

return text.replace(reg,(m)=>"<mark>"+m+"</mark>");

}

/* RENDER */

function renderTable(){

let start=(currentPage-1)*rowsPerPage;
let end=start+rowsPerPage;

let rows=filteredDocs.slice(start,end);

let keyword=document.querySelector(".searchBox input").value.toLowerCase();

let html="";

rows.forEach(doc=>{

let badge=doc.type?`<span class="badge ${doc.type}">${doc.type}</span>`:"";

let title=highlight(doc.ten || "",keyword);

html+=`
<tr onclick="openPDF('${doc.linkpdf}')">
<td>${doc.so || ""}</td>
<td>${badge}${title}</td>
<td>${doc.ngay || ""}</td>
<td>
${doc.linkword?`<a href="${doc.linkword}" target="_blank">
<i class="fa-solid fa-eye"></i> Xem
</a>`:""}
</td>
</tr>
`;

});

document.getElementById("docTable").innerHTML=html;

document.getElementById("title").innerText=
"Danh sách văn bản ("+filteredDocs.length+" văn bản)";

renderPagination();

}

/* PAGINATION */

function renderPagination(){

let totalPages=Math.ceil(filteredDocs.length/rowsPerPage);

let html="";

for(let i=1;i<=totalPages;i++){

html+=`<div class="page-btn ${i===currentPage?'active':''}"
onclick="changePage(${i})">${i}</div>`;

}

document.getElementById("pagination").innerHTML=html;

}

function changePage(p){

currentPage=p;
renderTable();

}

/* FILTER */

function filterDocs(type){

if(type==="all") filteredDocs=allDocs;

else filteredDocs=allDocs.filter(d=>d.type===type);

currentPage=1;

renderTable();

}

/* SEARCH */

let timer;

function searchDocs(keyword){

clearTimeout(timer);

timer=setTimeout(()=>{

keyword=keyword.toLowerCase();

filteredDocs=allDocs.filter(doc=>

(doc.so && doc.so.toLowerCase().includes(keyword)) ||
(doc.ten && doc.ten.toLowerCase().includes(keyword))

);

currentPage=1;

renderTable();

},200);

}

/* OPEN PDF */

function openPDF(url){

window.open(url,"_blank");

}

</script>

</body>
</html>
