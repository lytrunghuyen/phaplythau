<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Thư viện văn bản đấu thầu</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600&display=swap" rel="stylesheet">

<style>

body{
font-family:'Montserrat',sans-serif;
margin:0;
display:flex;
background:#f8f9fb;
}

.sidebar{
width:260px;
background:#f2f3f5;
height:100vh;
padding:25px;
border-right:1px solid #e5e7eb;
}

.sidebar h2{
margin-top:0;
font-size:20px;
font-weight:600;
color:#374151;
margin-bottom:25px;
}

.sidebar a{
display:flex;
align-items:center;
gap:12px;
padding:12px 14px;
margin-bottom:6px;
color:#374151;
text-decoration:none;
font-size:17px;
border-radius:10px;
}

.sidebar a:hover{
background:#ede9fe;
color:#7c3aed;
}

.sidebar a.active{
background:#e9d5ff;
color:#7c3aed;
font-weight:600;
}

.content{
flex:1;
padding:35px;
}

table{
width:100%;
border-collapse:collapse;
background:white;
}

th,td{
border-bottom:1px solid #eee;
padding:14px;
text-align:left;
}

th{
background:#6e35e8;
color:white;
}

</style>

</head>

<body>

<div class="sidebar">

<h2>📚 Văn bản</h2>

<a href="#" onclick="filterDocs('all')">Trang chủ</a>
<a href="#" onclick="filterDocs('luat')">Luật</a>
<a href="#" onclick="filterDocs('nghidinh')">Nghị định</a>
<a href="#" onclick="filterDocs('thongtu')">Thông tư</a>
<a href="#" onclick="filterDocs('huongdan')">Hướng dẫn</a>

</div>

<div class="content">

<h1>Danh sách văn bản</h1>

<table>

<thead>
<tr>
<th>Số văn bản</th>
<th>Tên</th>
<th>Ngày</th>
<th>Link</th>
</tr>
</thead>

<tbody id="docTable">
</tbody>

</table>

</div>

<script>

let allDocs=[];

fetch("https://opensheet.elk.sh/15t10NKlFARFJK0Fqx66R2qxTCKXZn_tjVJfQ-5lUMQI/Sheet1")
.then(res=>res.json())
.then(data=>{

allDocs=data;
renderTable(data);

});

function renderTable(data){

let html="";

data.forEach(doc=>{

html+=`
<tr data-type="${doc.type}">
<td>${doc.so}</td>
<td>${doc.ten}</td>
<td>${doc.ngay}</td>
<td><a href="${doc.link}" target="_blank">Xem PDF</a></td>
</tr>
`;

});

document.getElementById("docTable").innerHTML=html;

}

function filterDocs(type){

if(type==="all"){
renderTable(allDocs);
return;
}

let filtered=allDocs.filter(doc=>doc.type===type);
renderTable(filtered);

}

</script>

</body>
</html>
